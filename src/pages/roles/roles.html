<grid
  pageTitle="Roller"
  captionTitle="Rol Listesi"
  endpoint="/board-decisions/odata/roles"
  [addOptions]="{url:'/roles/add', permission:'role:add'}"
  [editOptions]="{url:'/roles/edit', permission:'role:edit'}"
  [detailOptions]="{url:'/roles/detail', permission:'role:view'}"
  [deleteOptions]="{url:'/board-decisions/roles', permission:'role:delete'}"
  [breadcrumbs]="breadcrumbs()"
  >
  <flexi-grid-column field="name" title="Rol Adı" />
  <flexi-grid-column field="permissionCount" title="İzinler" textAlign="center" />
  <ng-template #columnCommandTemplate let-item>
  @if(checkPermission('role:update_permissions')){
  <flexi-button
    btnColor="secondary"
    btnSize="small"
    btnIcon="key"
    title="İzinler"
    flexiTooltip
    [routerLink]="['/roles/permissions', item.id]"/>
  }
  </ng-template>
</grid>
