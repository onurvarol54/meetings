<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold">Toplantıya Katıl</h1>
            <p class="text-muted mb-0">
              Toplantı kodu ve üye kodu ile giriş yapabilirsiniz.
            </p>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Toplantı Kodu</label>
            <input
              type="text"
              class="form-control form-control-lg"
              [ngModel]="meetingCode()"
              (ngModelChange)="meetingCode.set($event)"
              placeholder="Toplantı kodunu giriniz"
            />
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Üye Kodu</label>
            <input
              type="text"
              class="form-control form-control-lg"
              [ngModel]="memberCode()"
              (ngModelChange)="memberCode.set($event)"
              placeholder="Üye kodunu giriniz"
            />
          </div>

          <div class="d-grid">
            <button class="btn btn-primary btn-lg" [disabled]="loading()" (click)="joinMeeting()">
              {{ loading() ? 'Kontrol ediliyor...' : 'Katıl' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
